# k8x Configuration Example
# Copy this file to ~/.k8x/config.yaml and customize

llm:
  # Default LLM provider to use (openai, anthropic)
  default_provider: "anthropic"

  providers:
    openai:
      model: "gpt-4"
      base_url: ""  # Leave empty for default
      options:
        temperature: "0.1"
        max_tokens: "2000"

    anthropic:
      model: "claude-3-5-sonnet-20241022"
      base_url: ""  # Leave empty for default
      options:
        temperature: "0.1"
        max_tokens: "2000"

# MCP (Model Context Protocol) Configuration
mcp:
  # Enable MCP integration
  enabled: true

  servers:
    # Example: stdio-based filesystem operations MCP server
    filesystem:
      enabled: true
      transport: "stdio"
      command: "npx"
      args: ["@modelcontextprotocol/server-filesystem", "/path/to/allowed/directory"]
      description: "Provides filesystem operations for the specified directory"
      env:
        DEBUG: "mcp:*"

    # Example: HTTP-based MCP server
    web_service:
      enabled: false
      transport: "sse"
      base_url: "https://api.example.com/mcp"
      description: "MCP server accessible via Server-Sent Events over HTTP"

    # Example: OAuth-authenticated MCP server
    oauth_service:
      enabled: false
      transport: "oauth-sse"
      base_url: "https://secure.example.com/mcp"
      description: "OAuth-protected MCP server"
      oauth:
        client_id: "your-client-id"
        client_secret: "your-client-secret"
        redirect_uri: "http://localhost:8080/callback"
        scopes: ["mcp:read", "mcp:write"]
        auth_server_metadata_url: "https://auth.example.com/.well-known/oauth-authorization-server"
        pkce_enabled: true

    # Example: GitHub MCP server (stdio)
    github:
      enabled: false
      transport: "stdio"
      command: "npx"
      args: ["@modelcontextprotocol/server-github"]
      description: "Provides GitHub repository access"
      env:
        GITHUB_PERSONAL_ACCESS_TOKEN: "your-token-here"

    # Example: PostgreSQL MCP server (stdio)
    postgres:
      enabled: false
      transport: "stdio"
      command: "npx"
      args: ["@modelcontextprotocol/server-postgres"]
      description: "Provides PostgreSQL database access"
      env:
        DATABASE_URL: "postgresql://username:password@localhost:5432/dbname"

    # Example: Streamable HTTP MCP server
    analytics:
      enabled: false
      transport: "http"
      base_url: "https://analytics.example.com/mcp"
      description: "Analytics MCP server via streamable HTTP"

    # Example: another k8x instance as MCP server (stdio)
    k8x_remote:
      enabled: false
      transport: "stdio"
      command: "k8x"
      args: ["mcp", "serve"]
      description: "Remote k8x instance with different cluster access"
      env:
        KUBECONFIG: "/path/to/remote/kubeconfig"

kubernetes:
  # Default Kubernetes context (leave empty to use current context)
  context: ""
  # Default namespace (leave empty to use default namespace)
  namespace: ""
  # Path to kubeconfig file (leave empty to use default ~/.kube/config)
  kubeconfig_path: ""

settings:
  # Enable verbose output
  verbose: false
  # Enable command history tracking
  history_enabled: true
  # Enable undo functionality (future feature)
  undo_enabled: false
